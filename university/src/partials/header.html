            <div class="flex items-baseline gap-2">

        <nav class="hidden md:flex items-center gap-6 text-sm">
            <a href="/foundations.html" class="font-mono text-text-secondary hover:text-terminal-green transition-colors">foundations</a>

            <button @click="mobileOpen = !mobileOpen" class="md:hidden text-text-secondary hover:text-terminal-green">
